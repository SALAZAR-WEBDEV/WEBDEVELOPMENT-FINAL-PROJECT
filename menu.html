<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCU Coffee Shop | Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">OCU COFFEE SHOP</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link active" href="menu.html">Menu</a>
                <a class="nav-link" href="info.html">Store Info</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Our Coffee Menu</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Latte">
                    <div class="card-body text-center">
                        <h5 class="card-title">Classic Latte</h5>
                        <p class="card-text">Rich espresso with creamy steamed milk.</p>
                        <span class="badge bg-success">$3.50</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Cappuccino">
                    <div class="card-body text-center">
                        <h5 class="card-title">Cappuccino</h5>
                        <p class="card-text">Espresso topped with a deep layer of foam.</p>
                        <span class="badge bg-success">$3.50</span>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="https://via.placeholder.com/150" class="card-img-top" alt="Cold Brew">
                    <div class="card-body text-center">
                        <h5 class="card-title">Cold Brew</h5>
                        <p class="card-text">Smooth, low-acid coffee steeped for 12 hours.</p>
                        <span class="badge bg-success">$4.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
